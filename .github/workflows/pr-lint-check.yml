name: Build & Lint Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Validate Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/frontend/package-lock.json
            apps/backend/package-lock.json
            apps/partykit/package-lock.json

      - name: Install Dependencies
        id: install
        run: npm ci

      - name: Detect Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
            backend:
              - 'apps/backend/**'
            partykit:
              - 'apps/partykit/**'

      - name: Run Checks
        id: build
        continue-on-error: true
        run: |
          # Initialize log
          touch build_log.txt
          EXIT_CODE=0
          echo "Starting validation process..." > build_log.txt

          # --- FRONTEND (React + Vite) ---
          if [ "${{ steps.filter.outputs.frontend }}" == 'true' ]; then
            echo -e "\n--- Frontend: Lint, Typecheck & Build ---" >> build_log.txt
            FE_FAILED=0

            # Lint
            LINT_OUTPUT=$(npm run lint -w @claude-cope/frontend 2>&1) || {
              echo "❌ Frontend Lint FAILED" >> build_log.txt
              echo "$LINT_OUTPUT" >> build_log.txt
              FE_FAILED=1
              EXIT_CODE=1
            }
            if [ $FE_FAILED -eq 0 ]; then
              echo "✅ Frontend Lint passed" >> build_log.txt
            fi

            # Typecheck
            if [ $FE_FAILED -eq 0 ]; then
              TYPECHECK_OUTPUT=$(npm run typecheck -w @claude-cope/frontend 2>&1) || {
                echo "❌ Frontend Typecheck FAILED" >> build_log.txt
                echo "$TYPECHECK_OUTPUT" >> build_log.txt
                FE_FAILED=1
                EXIT_CODE=1
              }
              if [ $FE_FAILED -eq 0 ]; then
                echo "✅ Frontend Typecheck passed" >> build_log.txt
              fi
            fi

            # Build
            BUILD_OUTPUT=$(npm run build -w @claude-cope/frontend 2>&1) || {
              echo "❌ Frontend Build FAILED" >> build_log.txt
              echo "$BUILD_OUTPUT" | tail -100 >> build_log.txt
              FE_FAILED=1
              EXIT_CODE=1
            }
            if [ $FE_FAILED -eq 0 ]; then
              echo "✅ Frontend Build passed" >> build_log.txt
            fi
          fi

          # --- BACKEND (Hono) ---
          if [ "${{ steps.filter.outputs.backend }}" == 'true' ]; then
            echo -e "\n--- Backend: Lint, Typecheck & Build ---" >> build_log.txt
            BE_FAILED=0

            # Lint
            LINT_OUTPUT=$(npm run lint -w @claude-cope/backend 2>&1) || {
              echo "❌ Backend Lint FAILED" >> build_log.txt
              echo "$LINT_OUTPUT" >> build_log.txt
              BE_FAILED=1
              EXIT_CODE=1
            }
            if [ $BE_FAILED -eq 0 ]; then
              echo "✅ Backend Lint passed" >> build_log.txt
            fi

            # Typecheck
            if [ $BE_FAILED -eq 0 ]; then
              TYPECHECK_OUTPUT=$(npm run typecheck -w @claude-cope/backend 2>&1) || {
                echo "❌ Backend Typecheck FAILED" >> build_log.txt
                echo "$TYPECHECK_OUTPUT" >> build_log.txt
                BE_FAILED=1
                EXIT_CODE=1
              }
              if [ $BE_FAILED -eq 0 ]; then
                echo "✅ Backend Typecheck passed" >> build_log.txt
              fi
            fi

            # Build
            BUILD_OUTPUT=$(npm run build -w @claude-cope/backend 2>&1) || {
              echo "❌ Backend Build FAILED" >> build_log.txt
              echo "$BUILD_OUTPUT" | tail -100 >> build_log.txt
              BE_FAILED=1
              EXIT_CODE=1
            }
            if [ $BE_FAILED -eq 0 ]; then
              echo "✅ Backend Build passed" >> build_log.txt
            fi
          fi

          # --- PARTYKIT (Real-Time Server) ---
          if [ "${{ steps.filter.outputs.partykit }}" == 'true' ]; then
            echo -e "\n--- PartyKit: Lint & Typecheck ---" >> build_log.txt
            PK_FAILED=0

            # Lint
            LINT_OUTPUT=$(npm run lint -w @claude-cope/partykit 2>&1) || {
              echo "❌ PartyKit Lint FAILED" >> build_log.txt
              echo "$LINT_OUTPUT" >> build_log.txt
              PK_FAILED=1
              EXIT_CODE=1
            }
            if [ $PK_FAILED -eq 0 ]; then
              echo "✅ PartyKit Lint passed" >> build_log.txt
            fi

            # Typecheck
            if [ $PK_FAILED -eq 0 ]; then
              TYPECHECK_OUTPUT=$(npm run typecheck -w @claude-cope/partykit 2>&1) || {
                echo "❌ PartyKit Typecheck FAILED" >> build_log.txt
                echo "$TYPECHECK_OUTPUT" >> build_log.txt
                PK_FAILED=1
                EXIT_CODE=1
              }
              if [ $PK_FAILED -eq 0 ]; then
                echo "✅ PartyKit Typecheck passed" >> build_log.txt
              fi
            fi
          fi

          exit $EXIT_CODE

      - name: Post Failure Comment
        if: steps.build.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNumber = context.issue.number;
            const runUrl = 'https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId;

            let log = '';
            try { log = fs.readFileSync('build_log.txt', 'utf8'); }
            catch (e) { log = 'Log file missing.'; }

            if (log.length > 60000) {
              log = log.substring(0, 60000) + "\n\n...(truncated)";
            }

            const body = [
              '### ❌ Checks Failed',
              'Linting or Build errors were detected.',
              '',
              '<details>',
              '<summary>View Logs</summary>',
              '',
              '~~~text',
              log,
              '~~~',
              '</details>',
              '',
              '**[View Workflow](' + runUrl + ')**'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });

      - name: Fail Job
        if: steps.build.outcome == 'failure'
        run: exit 1
