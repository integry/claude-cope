name: Build & Lint Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Validate Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json
            apps/api/package-lock.json

      - name: Install Dependencies
        id: install
        run: npm ci

      - name: Detect Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
            api:
              - 'apps/api/**'

      - name: Run Checks
        id: build
        continue-on-error: true
        run: |
          # Initialize log
          touch build_log.txt
          EXIT_CODE=0
          echo "Starting validation process..." > build_log.txt

          # --- WEB (React Frontend) ---
          if [ "${{ steps.filter.outputs.web }}" == 'true' ]; then
            echo -e "\n--- Web App: Lint & Build ---" >> build_log.txt
            WEB_FAILED=0

            # Lint
            LINT_OUTPUT=$(npm run lint -w apps/web -- --max-warnings 0 2>&1) || {
              echo "❌ Web Lint FAILED" >> build_log.txt
              echo "$LINT_OUTPUT" >> build_log.txt
              WEB_FAILED=1
              EXIT_CODE=1
            }
            if [ $WEB_FAILED -eq 0 ]; then
              echo "✅ Web Lint passed" >> build_log.txt
            fi

            # Typecheck
            if [ $WEB_FAILED -eq 0 ]; then
              TYPECHECK_OUTPUT=$(npm run typecheck -w apps/web 2>&1) || {
                echo "❌ Web Typecheck FAILED" >> build_log.txt
                echo "$TYPECHECK_OUTPUT" >> build_log.txt
                WEB_FAILED=1
                EXIT_CODE=1
              }
              if [ $WEB_FAILED -eq 0 ]; then
                echo "✅ Web Typecheck passed" >> build_log.txt
              fi
            fi

            # Build
            BUILD_OUTPUT=$(npm run build -w apps/web 2>&1) || {
              echo "❌ Web Build FAILED" >> build_log.txt
              echo "$BUILD_OUTPUT" | tail -100 >> build_log.txt
              WEB_FAILED=1
              EXIT_CODE=1
            }
            if [ $WEB_FAILED -eq 0 ]; then
              echo "✅ Web Build passed" >> build_log.txt
            fi
          fi

          # --- API (Hono Backend) ---
          if [ "${{ steps.filter.outputs.api }}" == 'true' ]; then
            echo -e "\n--- API: Lint & Build ---" >> build_log.txt
            API_FAILED=0

            # Lint
            LINT_OUTPUT=$(npm run lint -w apps/api -- --max-warnings 0 2>&1) || {
              echo "❌ API Lint FAILED" >> build_log.txt
              echo "$LINT_OUTPUT" >> build_log.txt
              API_FAILED=1
              EXIT_CODE=1
            }
            if [ $API_FAILED -eq 0 ]; then
              echo "✅ API Lint passed" >> build_log.txt
            fi

            # Typecheck
            if [ $API_FAILED -eq 0 ]; then
              TYPECHECK_OUTPUT=$(npm run typecheck -w apps/api 2>&1) || {
                echo "❌ API Typecheck FAILED" >> build_log.txt
                echo "$TYPECHECK_OUTPUT" >> build_log.txt
                API_FAILED=1
                EXIT_CODE=1
              }
              if [ $API_FAILED -eq 0 ]; then
                echo "✅ API Typecheck passed" >> build_log.txt
              fi
            fi

            # Build
            BUILD_OUTPUT=$(npm run build -w apps/api 2>&1) || {
              echo "❌ API Build FAILED" >> build_log.txt
              echo "$BUILD_OUTPUT" | tail -100 >> build_log.txt
              API_FAILED=1
              EXIT_CODE=1
            }
            if [ $API_FAILED -eq 0 ]; then
              echo "✅ API Build passed" >> build_log.txt
            fi
          fi

          exit $EXIT_CODE

      - name: Post Failure Comment
        if: steps.build.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNumber = context.issue.number;
            const runUrl = 'https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId;

            let log = '';
            try { log = fs.readFileSync('build_log.txt', 'utf8'); }
            catch (e) { log = 'Log file missing.'; }

            if (log.length > 60000) {
              log = log.substring(0, 60000) + "\n\n...(truncated)";
            }

            const body = [
              '### ❌ Checks Failed',
              'Linting or Build errors were detected.',
              '',
              '<details>',
              '<summary>View Logs</summary>',
              '',
              '~~~text',
              log,
              '~~~',
              '</details>',
              '',
              '**[View Workflow](' + runUrl + ')**'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });

      - name: Fail Job
        if: steps.build.outcome == 'failure'
        run: exit 1
