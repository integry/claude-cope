name = "claude-cope-backend"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[dev]
port = 8787

[[d1_databases]]
binding = "DB"
database_name = "claude-cope-db"
database_id = "placeholder-database-id"

[[kv_namespaces]]
binding = "USAGE_KV"
id = "placeholder-kv-id"

[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "0"
simple = { limit = 100, period = 60 }
