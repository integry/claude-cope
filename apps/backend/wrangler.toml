name = "claude-cope-backend"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[dev]
port = 8787

[[d1_databases]]
binding = "DB"
database_name = "claude-cope-db"
database_id = "placeholder-database-id"

[[kv_namespaces]]
binding = "USAGE_KV"
id = "placeholder-kv-id"

[[kv_namespaces]]
binding = "QUOTA_KV"
id = "placeholder-quota-kv-id"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "placeholder-rate-limit-kv-id"
preview_id = "placeholder-rate-limit-kv-preview-id"

# Legacy simple rate limiter — used by /api/verify ONLY (see routes/verify.ts).
# /api/chat uses RATE_LIMIT_KV + WAF rules instead (see docs/rate-limit-rollout.md).
# TODO: migrate /api/verify to RATE_LIMIT_KV, then remove this binding.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "0"
simple = { limit = 100, period = 60 }
